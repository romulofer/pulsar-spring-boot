# This package has no automated test suite, so CI only verifies the TypeScript
# build (tsc) across the three supported platforms. Compilation needs Node and
# the `typescript` devDependency, not the Pulsar runtime, so `npm` installs the
# toolchain and runs the build. `npm install` also runs the postinstall server
# download (script.js), which now logs and continues on failure instead of
# breaking the install.
name: CI

on:
  - push
  - pull_request

env:
  CI: true

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
